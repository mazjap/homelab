services:
  unbound:
    container_name: unbound
    image: klutchell/unbound:latest
    restart: unless-stopped
    ports:
      - "5335:53/tcp"
      - "5335:53/udp"
    volumes:
      - ./unbound:/opt/unbound/etc/unbound/
    networks:
      pihole_net:
        ipv4_address: 10.2.0.2

  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8082:80/tcp"
    environment:
      TZ: America/Denver
      DNSMASQ_LISTENING: all
      PIHOLE_DNS_: 10.2.0.2#53
      FTLCONF_dns_upstreams: 10.2.0.2#53
      # Set password via: docker exec pihole pihole -a -p
    volumes:
      - ./pihole/etc-pihole:/etc/pihole
      - ./pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    networks:
      pihole_net:
        ipv4_address: 10.2.0.3
    depends_on:
      - unbound

  wg-easy:
    container_name: wg-easy
    image: ghcr.io/wg-easy/wg-easy
    restart: unless-stopped
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    environment:
      WG_HOST: 38.78.243.102
      # Generate a password hash via `docker run -it ghcr.io/wg-easy/wg-easy wgpw 'YourPassword123'`
      PASSWORD_HASH: ${WIREGUARD_PASSWORD_HASH}
      WG_DEFAULT_DNS: 10.2.0.3
      WG_ALLOWED_IPS: 0.0.0.0/0,::/0
    volumes:
      - ./wg-easy:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      pihole_net:
        ipv4_address: 10.2.0.4

  homepage:
    container_name: homepage
    image: ghcr.io/gethomepage/homepage:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      TZ: America/Denver
      HOMEPAGE_ALLOWED_HOSTS: 192.168.0.40:3000,homepage.home,page.home
      HOMEPAGE_VAR_WIREGUARD_PASSWORD: ${WIREGUARD_PASSWORD}
      HOMEPAGE_VAR_PIHOLE_API_KEY: ${PIHOLE_API_KEY}
      HOMEPAGE_VAR_PORTAINER_API_KEY: ${PORTAINER_API_KEY}
      HOMEPAGE_VAR_NPM_USERNAME: ${NPM_USERNAME}
      HOMEPAGE_VAR_NPM_PASSWORD: ${NPM_PASSWORD}
      HOMEPAGE_VAR_OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY}
      HOMEPAGE_VAR_USER_LATITUDE: ${USER_LATITUDE}
      HOMEPAGE_VAR_USER_LONGITUDE: ${USER_LONGITUDE}
      HOMEPAGE_VAR_USER_LOCATION_LABEL: ${USER_LOCATION_LABEL}
      HOMEPAGE_VAR_PAPERLESS_API_KEY: ${PAPERLESS_API_KEY}
    networks:
      pihole_net:
        ipv4_address: 10.2.0.5

  fourget:
    container_name: fourget
    image: 4get-arm:latest
    restart: unless-stopped
    ports:
      - "8282:80"
    environment:
      FOURGET_PROTO: http
      FOURGET_SERVER_NAME: 4get.home
      FOURGET_INSTANCES: http://192.168.0.40:8282
    networks:
      pihole_net:
        ipv4_address: 10.2.0.11

  glances:
    container_name: glances
    image: nicolargo/glances:latest
    restart: unless-stopped
    ports:
      - "61208:61208"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      GLANCES_OPT: -w
    networks:
      pihole_net:
        ipv4_address: 10.2.0.7

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer:/data
    networks:
      pihole_net:
        ipv4_address: 10.2.0.8

  uptime-kuma:
    container_name: uptime-kuma
    image: louislam/uptime-kuma:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./uptime-kuma:/app/data
    networks:
      pihole_net:
        ipv4_address: 10.2.0.9

  nginx-proxy-manager:
    container_name: nginx-proxy-manager
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - "81:81"
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy-manager/data:/data
      - ./nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    networks:
      pihole_net:
        ipv4_address: 10.2.0.10

  gitea:
    container_name: gitea
    image: gitea/gitea:latest
    restart: unless-stopped
    ports:
      - "3030:3000"
      - "2222:22"
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__DOMAIN: gitea.home
      GITEA__server__ROOT_URL: http://gitea.home/
      GITEA__server__HTTP_PORT: 3000
    volumes:
      - ./gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      pihole_net:
        ipv4_address: 10.2.0.12

  linkding:
    container_name: linkding
    image: sissbruecker/linkding:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./linkding:/etc/linkding/data
    environment:
      LD_SUPERUSER_NAME: jman
      LD_SUPERUSER_PASSWORD: ${LINKDING_PASSWORD}
    networks:
      pihole_net:
        ipv4_address: 10.2.0.14

  paperless-redis:
    container_name: paperless-redis
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./paperless/redis:/data
    networks:
      pihole_net:
        ipv4_address: 10.2.0.15

  paperless-db:
    container_name: paperless-db
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - ./paperless/db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${PAPERLESS_DB_PASSWORD}
    networks:
      pihole_net:
        ipv4_address: 10.2.0.16

  paperless:
    container_name: paperless
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - paperless-db
      - paperless-redis
    ports:
      - "8000:8000"
    volumes:
      - ./paperless/data:/usr/src/paperless/data
      - ./paperless/media:/usr/src/paperless/media
      - ./paperless/export:/usr/src/paperless/export
      - ./paperless/consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://10.2.0.15:6379
      PAPERLESS_DBHOST: 10.2.0.16
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: ${PAPERLESS_DB_PASSWORD}
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_URL: http://paperless.home
      PAPERLESS_TIME_ZONE: America/Denver
      PAPERLESS_OCR_LANGUAGE: eng
      USERMAP_UID: 1000
      USERMAP_GID: 1000
    networks:
      pihole_net:
        ipv4_address: 10.2.0.17

networks:
  pihole_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.2.0.0/24
